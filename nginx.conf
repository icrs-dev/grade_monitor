# CloudMarking 云阅卷 — Nginx 反代配置
# 将下方内容按需合并到 /etc/nginx/sites-enabled/ 或 nginx.conf 的 http 块中

# ═══════════════════════════════════════════════════════════
# 方案 A: 独立子域名（推荐）
# ═══════════════════════════════════════════════════════════
#
# server {
#     listen 80;
#     server_name cloudmarking.your-domain.com;
#     return 301 https://$host$request_uri;
# }
#
# server {
#     listen 443 ssl http2;
#     server_name cloudmarking.your-domain.com;
#
#     ssl_certificate     /etc/ssl/certs/cloudmarking.pem;
#     ssl_certificate_key /etc/ssl/private/cloudmarking.key;
#
#     location / {
#         proxy_pass http://127.0.0.1:8000;
#         include proxy_params;
#     }
# }

# ═══════════════════════════════════════════════════════════
# 方案 B: 子目录部署
# ═══════════════════════════════════════════════════════════
#
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#     ...
#
#     location /cloudmarking/ {
#         proxy_pass http://127.0.0.1:8000/;
#         include proxy_params;
#     }
#     # 前端已自动适配子目录，无需额外配置
# }

# ═══════════════════════════════════════════════════════════
# 通用 proxy 参数（include proxy_params; 引用）
# ═══════════════════════════════════════════════════════════
# 将这些参数放到一个单独文件 /etc/nginx/proxy_params 或直接写在 location 块内

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Forwarded-Port  $server_port;

proxy_http_version 1.1;
proxy_set_header Connection "";

proxy_redirect off;
proxy_buffering off;

# 超时
proxy_connect_timeout 30s;
proxy_read_timeout 30s;
proxy_send_timeout 30s;

# 上传限制（验证码图片等）
client_max_body_size 8m;

# ═══════════════════════════════════════════════════════════
# 可选: 静态资源缓存
# ═══════════════════════════════════════════════════════════
#
# location /static/ {
#     proxy_pass http://127.0.0.1:8000/static/;
#     include proxy_params;
#     expires 7d;
#     add_header Cache-Control "public, immutable";
# }

# ═══════════════════════════════════════════════════════════
# 可选: 安全头
# ═══════════════════════════════════════════════════════════
